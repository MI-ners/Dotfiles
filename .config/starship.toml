# ~/.config/starship.toml

add_newline = false

# We wrap the brackets in white, make the "? //" Modus Cyan, and let the modules handle the rest
format = "\\[ [? //](#00d3d0) $directory$git_branch$git_status \\] $character"

[directory]
format = "[$path]($style)"
# Modus Vivendi Blue (matches your strings)
style = "bold #2fafff"
truncation_length = 3
truncate_to_repo = false

[character]
success_symbol = "[\\$](bold white) "
# Modus Vivendi Red for failed commands
error_symbol = "[\\$](bold #ff5f59) "

# ==========================================
# GIT CONFIGURATION
# ==========================================
[git_branch]
disabled = false
format = " | [$branch]($style)"
# Modus Vivendi Magenta (matches your function names)
style = "bold #f78fe7"

[git_status]
disabled = false
format = " [$all_status$ahead_behind]($style)"
# Modus Vivendi Green
style = "bold #44bc44"
modified = "*"
staged = "+"
untracked = "?"
deleted = "x"
ahead = ">"
behind = "<"
diverged = "<>"

# Disable the fluff
[package]
disabled = true

[cmd_duration]
disabled = true
