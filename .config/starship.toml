# ~/.config/starship.toml

add_newline = false

# UPDATED: Added git_branch and git_status inside the brackets
format = "\\[ ? // $directory$git_branch$git_status\\]$character"

[directory]
format = "[$path]($style)"
style = "white"
truncation_length = 3
truncate_to_repo = false

[character]
success_symbol = "[\\$](white) "
error_symbol = "[\\$](bold red) "

# ==========================================
# GIT CONFIGURATION
# ==========================================
[git_branch]
disabled = false
# Adds a clean pipe separator before the branch name
format = " | [$branch]($style)"
style = "bold white"

[git_status]
disabled = false
# Keeps the status symbols tucked cleanly next to the branch
format = " [$all_status$ahead_behind]($style)"
style = "white"
# Stripping out emojis for raw ASCII
modified = "*"
staged = "+"
untracked = "?"
deleted = "x"
ahead = ">"
behind = "<"
diverged = "<>"

# Keep these disabled
[package]
disabled = true

[cmd_duration]
disabled = true
