# ~/.config/starship.toml

# Disable the empty line between prompts to keep the terminal compact
add_newline = false

# This defines the exact layout.
# We use \\[ and \\] to tell Starship to print literal brackets instead of trying to format them.
format = "\\[ ? // $directory\\]$character"

[directory]
# Strip out the default "in " text and folder icon
format = "[$path]($style)"
# Match the flat, unstyled text from the screenshot
style = "white"
# How many directories to show before shortening (e.g., ~/foo/bar/baz)
truncation_length = 3
truncate_to_repo = false

[character]
# The literal dollar sign.
success_symbol = "[\\$](white) "
# Turns the dollar sign red if your last command failed (a nice hidden feature)
error_symbol = "[\\$](bold red) "

# Disable everything else so no random modules pop up
[git_branch]
disabled = true

[git_status]
disabled = true

[package]
disabled = true

[cmd_duration]
disabled = true
