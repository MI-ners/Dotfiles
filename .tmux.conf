set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",foot:Tc"
set -g mouse on
set -g set-clipboard on
set -s escape-time 0
set -g default-command "${SHELL}"
set -g set-titles on
set -g set-titles-string "tmux/#S"
unbind r
bind r source-file ~/dotfiles/.tmux.conf
unbind C-b
set -g prefix C-g
bind-key C-g send-prefix
unbind-key x
bind-key X kill-pane
set -g mouse on
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
unbind %
bind "=" split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
set-option -g status-position top
# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane
#cht sh
bind-key -r z run-shell "tmux neww ~/scripts/bash/cht.sh"

# Colors
thm_bg="#000000"
thm_fg="#ffffff"
thm_grey="#1a1a1a"
thm_dark_grey="#595959"
thm_teal="#00d3d0"
thm_pink="#feacd0"
thm_blue="#2fafff"
thm_green="#44bc44"

set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "centre"
set -g status-left-length "100"
set -g status-right-length "100"

# Pane borders
set -g pane-border-style "fg=${thm_dark_grey}"
set -g pane-active-border-style "fg=${thm_teal}"

# Message and mode
set -g message-style "fg=${thm_teal},bg=${thm_bg},align=centre"
set -g mode-style "fg=${thm_teal},bg=${thm_grey},bold"

# Status left: shows "tmux" in blue
set -g status-left "#[fg=${thm_blue},bold] tmux  "

# Status right: prefix indicator turns pink when active, otherwise dim; then session name
set -g status-right "#{?client_prefix,#[fg=${thm_pink}],#[fg=${thm_dark_grey}]} #S  "

# Active window: teal index, white name, on dark grey bg
set -g window-status-current-format "#[fg=${thm_teal},bg=${thm_grey},bold] #I:#[fg=${thm_fg},bg=${thm_grey},bold] #W #[default]"

# Inactive window: dim
set -g window-status-format "#[fg=${thm_dark_grey},bg=${thm_bg}] #I: #W "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
run '~/.tmux/plugins/tpm/tpm'
set -sg escape-time 1
